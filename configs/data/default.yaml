# configs/data/default.yaml
# Data pipeline settings for UMA-Fold

# ── Dataset paths (relative to paths.data_dir from config.yaml) ─────────────
train_split: raw/train.csv
val_split: raw/val.csv
test_split: raw/test.csv

# ── DataLoader ────────────────────────────────────────────────────────────────
batch_size: 4
num_workers: 4
pin_memory: true

# ── Preprocessing ─────────────────────────────────────────────────────────────
max_seq_len: ${model.max_seq_len}   # inherits from model config
crop_long_sequences: true            # randomly crop sequences > max_seq_len
