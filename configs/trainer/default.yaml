# configs/trainer/default.yaml
# PyTorch Lightning Trainer settings

max_epochs: 100
accelerator: gpu          # "cpu" for smoke-tests without GPU
devices: 1                # single 24 GB VRAM GPU target
precision: bf16-mixed     # bfloat16 AMP – aligns with trunk_dtype
gradient_clip_val: 1.0
accumulate_grad_batches: 4
log_every_n_steps: 50

# ── Checkpointing ─────────────────────────────────────────────────────────────
enable_checkpointing: true
checkpoint_monitor: val/loss
checkpoint_mode: min
checkpoint_save_top_k: 3

# ── Early stopping ────────────────────────────────────────────────────────────
early_stopping:
  enabled: true
  monitor: val/loss
  patience: 10
  mode: min
