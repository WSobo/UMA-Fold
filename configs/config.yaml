# UMA-Fold root Hydra configuration
# Run with: python scripts/train.py (Hydra auto-discovers this file)

defaults:
  - model: pairmixer          # configs/model/pairmixer.yaml
  - data: default             # configs/data/default.yaml
  - trainer: default          # configs/trainer/default.yaml
  - _self_                    # allow overrides from CLI

# ── Experiment identity ──────────────────────────────────────────────────────
project_name: uma_fold
run_name: baseline

# ── Weights & Biases ─────────────────────────────────────────────────────────
wandb:
  enabled: true
  entity: null          # set to your W&B username / team
  project: ${project_name}
  name: ${run_name}
  tags: []
  notes: ""

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  data_dir: data/
  output_dir: outputs/
  checkpoint_dir: checkpoints/

# ── Mixed precision ───────────────────────────────────────────────────────────
# trunk (triangle ops, FFN) → bfloat16
# sensitive ops (softmax, loss) → float32
precision:
  trunk_dtype: bfloat16
  sensitive_dtype: float32
