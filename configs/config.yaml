# UMA-Fold Base Configuration
# ───────────────────────────
# Built for Hydra Configuration Management

project_name: "UMA-Fold"
run_name: "pairmixer-small-A5500"
seed: 42

# --- Training Hyperparameters ---
training:
  lr: 0.001
  epochs: 100
  devices: 1
  # bfloat16-mixed heavily minimizes VRAM allowing massive lengths
  precision: "bf16-mixed" 
  log_every_n_steps: 10
  accumulate_grad_batches: 4
  # Leverages PyTorch 2.x max throughput (ensure torch.compile works on your system)
  compile_model: True

# --- UMA-Fold / PairMixer Model Setup ---
model:
  # Matches Boltz-1 small model parameter footprints
  token_s: 384
  token_z: 128
  atom_s: 128
  atom_z: 32
  
  pairmixer_args:
    num_blocks: 12
    c_hidden_mul: 128
    drop_rate: 0.1
    gradient_checkpointing: True
  
  embedder_args: {}
  msa_args: 
    msa_blocks: 4
    msa_dropout: 0.15
    z_dropout: 0.15
  
  diffusion_args:
    accumulate_token_repr: True
  
  # Ensure the Diffusion Module remains ultra-lightweight and respects SO(3)
  # geometry limits so as not to overwhelm the A5500 during fine-tuning
  score_model_args:
    sigma_data: 16
    dim_fourier: 256
    atom_encoder_depth: 3
    atom_encoder_heads: 4
    token_transformer_depth: 8 # Shaved down from standard 24 for hyper-lightweight goal
    token_transformer_heads: 8
    atom_decoder_depth: 3
    atom_decoder_heads: 4
    conditioning_transition_layers: 2
    activation_checkpointing: True # Crucial for 24GB VRAM
    offload_to_cpu: False

# --- DataModule Setup (Piped straight to Boltz) ---
data:
  datasets: 
    - _target_: boltz.data.module.training.DatasetConfig
      target_dir: data/raw/rcsb_processed_targets
      msa_dir: data/raw/rcsb_processed_msa
      prob: 1.0
      sampler:
        _target_: boltz.data.sample.cluster.ClusterSampler
      cropper:
        _target_: boltz.data.crop.boltz.BoltzCropper
        min_neighborhood: 0
        max_neighborhood: 40
  filters: []
  tokenizer:
    _target_: boltz.data.tokenize.boltz.BoltzTokenizer
  featurizer: 
    _target_: boltz.data.feature.featurizer.BoltzFeaturizer
  max_atoms: 4608
  max_tokens: 512
  max_seqs: 4096
  samples_per_epoch: 1000
  batch_size: 1
  num_workers: 4
  random_seed: 42
  pin_memory: True
  symmetries: "data/raw/symmetry.pkl"
  atoms_per_window_queries: 32
  min_dist: 2.0
  max_dist: 22.0
  num_bins: 64
